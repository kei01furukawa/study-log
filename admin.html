<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学習記録 管理画面｜浜松南高校</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Meiryo',sans-serif;background:#f5f5f5;color:#1a1a1a;}
.container{max-width:1000px;margin:0 auto;padding:1.5rem;}
.app-header{font-size:12px;font-weight:600;color:#888;letter-spacing:.05em;margin-bottom:4px;}
h1{font-size:20px;font-weight:600;color:#1a1a1a;margin-bottom:1.5rem;}
.card{background:#fff;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.card-title{font-size:13px;font-weight:600;color:#888;letter-spacing:.05em;margin-bottom:1rem;}
.login-wrap{max-width:360px;margin:4rem auto;}
.login-wrap h1{text-align:center;margin-bottom:1.5rem;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:13px;color:#666;margin-bottom:4px;}
.field input{width:100%;height:42px;border:1px solid #ddd;border-radius:8px;padding:0 12px;font-size:15px;}
.btn{width:100%;padding:12px;background:#1D9E75;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;}
.btn-sm{padding:6px 14px;font-size:13px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#1a1a1a;}
.btn-sm.active{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.error-msg{color:#E24B4A;font-size:13px;margin-top:8px;text-align:center;}
.tab-bar{display:flex;border-bottom:1px solid #e0e0e0;margin-bottom:1.5rem;gap:0;overflow-x:auto;}
.tab{padding:10px 18px;font-size:14px;font-weight:500;cursor:pointer;color:#888;border-bottom:2px solid transparent;white-space:nowrap;}
.tab.active{color:#1a1a1a;border-bottom:2px solid #1D9E75;}
.date-row{display:flex;align-items:center;gap:12px;margin-bottom:1rem;flex-wrap:wrap;}
.date-row input[type=date]{height:38px;border:1px solid #ddd;border-radius:8px;padding:0 10px;font-size:14px;}
.summary-badges{display:flex;gap:8px;flex-wrap:wrap;}
.badge{font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;}
.badge-in{background:#E1F5EE;color:#085041;}
.badge-out{background:#FCEBEB;color:#A32D2D;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:8px 10px;border-bottom:2px solid #e0e0e0;color:#888;font-weight:600;white-space:nowrap;}
td{padding:8px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.status-in{color:#085041;font-weight:600;}
.status-out{color:#A32D2D;}
.total-min{font-weight:600;color:#1a1a1a;}
.link-btn{background:none;border:none;color:#1D9E75;font-size:13px;cursor:pointer;text-decoration:underline;padding:0;}
.student-select-row{display:flex;align-items:center;gap:12px;margin-bottom:1rem;flex-wrap:wrap;}
.student-select-row select{height:38px;border:1px solid #ddd;border-radius:8px;padding:0 10px;font-size:14px;min-width:160px;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem;}
.stat-card{background:#f8f8f8;border-radius:10px;padding:10px 12px;text-align:center;}
.stat-num{font-size:22px;font-weight:600;color:#1a1a1a;}
.stat-lbl{font-size:11px;color:#888;margin-top:2px;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.bar-label{font-size:12px;width:42px;color:#666;}
.bar-track{flex:1;height:16px;background:#e8e8e8;border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;}
.bar-val{font-size:12px;font-weight:600;width:40px;text-align:right;color:#1a1a1a;}
.attendance-wrap{overflow-x:auto;}
.attendance-table{border-collapse:collapse;font-size:12px;min-width:600px;}
.attendance-table th{padding:6px 8px;border:1px solid #e0e0e0;background:#f8f8f8;color:#888;font-weight:600;text-align:center;white-space:nowrap;}
.attendance-table td{padding:4px 6px;border:1px solid #f0f0f0;text-align:center;}
.att-cell-in{background:#9FE1CB;color:#085041;font-weight:600;border-radius:4px;}
.att-cell-out{color:#ddd;}
.att-hrno{text-align:left;font-weight:600;color:#1a1a1a;white-space:nowrap;padding:4px 10px;}
.sortable{cursor:pointer;user-select:none;}
.sortable:hover{color:#1D9E75;}
.sort-arrow{margin-left:4px;font-size:10px;}
.warn-low{color:#E24B4A;font-weight:600;}
.warn-mid{color:#EF9F27;font-weight:600;}
.month-nav{display:flex;align-items:center;gap:8px;margin-bottom:1rem;}
.month-nav button{background:#fff;border:1px solid #ddd;border-radius:8px;padding:4px 12px;font-size:13px;cursor:pointer;}
.month-nav span{font-size:14px;font-weight:600;min-width:100px;text-align:center;}
.loading{text-align:center;padding:2rem;color:#888;font-size:14px;}
.section{display:none;}.section.active{display:block;}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen" class="container">
  <div class="login-wrap">
    <p class="app-header">浜松南高校</p>
    <h1>学習記録 管理画面</h1>
    <div class="card">
      <div class="field">
        <label>パスワード</label>
        <input type="password" id="pass-input" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn" onclick="doLogin()">ログイン</button>
      <p class="error-msg" id="login-error"></p>
    </div>
  </div>
</div>

<!-- 管理画面 -->
<div id="admin-screen" class="container" style="display:none;">
  <p class="app-header">浜松南高校 管理画面</p>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
    <h1 style="margin:0;">学習記録 管理</h1>
    <button class="btn-sm" onclick="doLogout()">ログアウト</button>
  </div>

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('daily')">日別入力状況</div>
    <div class="tab" onclick="switchTab('student')">生徒別詳細</div>
    <div class="tab" onclick="switchTab('attendance')">生徒入力状況確認</div>
    <div class="tab" onclick="switchTab('summary')">生徒サマリー</div>
  </div>

  <!-- 日別タブ -->
  <div id="tab-daily" class="section active">
    <div class="card">
      <p class="card-title">日付を選択</p>
      <div class="date-row">
        <input type="date" id="date-picker">
        <button class="btn-sm active" onclick="loadDaily()">表示</button>
        <div class="summary-badges" id="daily-badges"></div>
      </div>
      <div id="daily-table-wrap"><p style="color:#888;font-size:14px;">日付を選択して「表示」を押してください。</p></div>
    </div>
  </div>

  <!-- 生徒別タブ -->
  <div id="tab-student" class="section">
    <div class="card">
      <p class="card-title">生徒を選択</p>
      <div class="student-select-row">
        <select id="student-select">
          <option value="">生徒を選択してください</option>
        </select>
        <button class="btn-sm active" onclick="loadStudent()">表示</button>
      </div>
      <div id="student-detail"><p style="color:#888;font-size:14px;">生徒を選択して「表示」を押してください。</p></div>
    </div>
  </div>

  <!-- 生徒入力状況確認タブ -->
  <div id="tab-attendance" class="section">
    <div class="card">
      <p class="card-title">月別 入力状況（生徒入力状況確認）</p>
      <div class="month-nav">
        <button onclick="changeAttMonth(-1)">◀</button>
        <span id="att-month-title"></span>
        <button onclick="changeAttMonth(1)">▶</button>
        <button class="btn-sm active" onclick="loadAttendance()">表示</button>
      </div>
      <div class="attendance-wrap" id="attendance-wrap">
        <p style="color:#888;font-size:14px;">「表示」を押してください。</p>
      </div>
    </div>
  </div>

  <!-- サマリータブ -->
  <div id="tab-summary" class="section">
    <div class="card">
      <p class="card-title">生徒別 月次サマリー</p>
      <div class="month-nav">
        <button onclick="changeSumMonth(-1)">◀</button>
        <span id="sum-month-title"></span>
        <button onclick="changeSumMonth(1)">▶</button>
        <button class="btn-sm active" onclick="loadSummary()">表示</button>
      </div>
      <div id="summary-wrap">
        <p style="color:#888;font-size:14px;">「表示」を押してください。</p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast" style="position:fixed;bottom:28px;left:50%;transform:translateX(-50%);white-space:nowrap;background:#085041;color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:500;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:99;"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxF41OQklJVUKf4Im_G1MT857TrBAC3v-ujRdi0jzGjk3pWnRkzviFgtZ2v3KSQl3K5Rg/exec';
const SUBJECTS = ['国語','数学','英語','理科','社会','その他'];
const SUBJECT_COLORS = ['#D4537E','#378ADD','#1D9E75','#EF9F27','#7F77DD','#888780'];

let sessionPass = '';
let allStudents = [];
let studentLogs = {};
let currentMonth = new Date();
let attMonth = new Date();
let sumMonth = new Date();
let summaryData = [];
let summarySort = {key:'hrno', asc:true};

function pad(n){return String(n).padStart(2,'0');}
function dateStr(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function monthKey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1);}

async function doLogin(){
  const pass=document.getElementById('pass-input').value;
  const errEl=document.getElementById('login-error');
  errEl.textContent='';
  if(!pass){errEl.textContent='パスワードを入力してください';return;}
  const loginCard=document.querySelector('.login-wrap .card');
  const loginBtn=document.querySelector('.login-wrap .btn');
  loginCard.style.opacity='0.5';
  loginCard.style.pointerEvents='none';
  loginBtn.textContent='認証中…';
  try{
    const res=await fetch(GAS_URL+'?pass='+encodeURIComponent(pass)+'&type=students');
    const data=await res.json();
    if(data.error){
      loginCard.style.opacity='';
      loginCard.style.pointerEvents='';
      loginBtn.textContent='ログイン';
      errEl.textContent='パスワードが正しくありません';
      return;
    }
    sessionPass=pass;
    allStudents=data.students;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('admin-screen').style.display='block';
    initAdmin();
  }catch(e){
    loginCard.style.opacity='';
    loginCard.style.pointerEvents='';
    loginBtn.textContent='ログイン';
    errEl.textContent='接続に失敗しました。しばらくしてから再試行してください。';
  }
}

function doLogout(){
  sessionPass='';
  document.getElementById('pass-input').value='';
  document.getElementById('login-error').textContent='';
  document.getElementById('login-screen').style.display='block';
  document.getElementById('admin-screen').style.display='none';
}

function initAdmin(){
  const yd=new Date();yd.setDate(yd.getDate()-1);
  document.getElementById('date-picker').value=dateStr(yd);
  attMonth=new Date();
  sumMonth=new Date();
  updateAttMonthTitle();
  updateSumMonthTitle();
  const sel=document.getElementById('student-select');
  sel.innerHTML='<option value="">生徒を選択してください</option>';
  allStudents.forEach(h=>{
    const opt=document.createElement('option');
    opt.value=h;opt.textContent='HRNO: '+h;
    sel.appendChild(opt);
  });
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['daily','student','attendance','summary'][i]===t));
  document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
}

async function loadDaily(){
  const date=document.getElementById('date-picker').value;
  if(!date){alert('日付を選択してください');return;}
  const wrap=document.getElementById('daily-table-wrap');
  const badges=document.getElementById('daily-badges');
  wrap.innerHTML='<p class="loading">読み込み中…</p>';
  badges.innerHTML='';
  try{
    const res=await fetch(GAS_URL+'?pass='+encodeURIComponent(sessionPass)+'&type=daily&date='+date);
    const data=await res.json();
    if(data.error){wrap.innerHTML='<p style="color:#E24B4A;">エラー：'+data.error+'</p>';return;}
    const submitted=data.logs;
    const submittedHrnos=submitted.map(l=>String(l.hrno));
    const notSubmitted=allStudents.filter(h=>!submittedHrnos.includes(String(h)));
    badges.innerHTML=
      `<span class="badge badge-in">入力済み ${submitted.length}名</span>`+
      `<span class="badge badge-out">未入力 ${notSubmitted.length}名</span>`;
    let html='<div style="overflow-x:auto;"><table><thead><tr><th>HRNO</th><th>氏名</th><th>状況</th><th>合計(分)</th><th>国語</th><th>数学</th><th>英語</th><th>理科</th><th>社会</th><th>その他</th><th></th></tr></thead><tbody>';
    submitted.forEach(l=>{
      const total=l.times.reduce((a,b)=>a+Number(b),0);
      html+=`<tr>
        <td>${l.hrno}</td><td>${l.name}</td>
        <td class="status-in">入力済み</td>
        <td class="total-min">${total}</td>
        ${l.times.map(t=>`<td>${Number(t)||0}</td>`).join('')}
        <td><button class="link-btn" onclick="jumpToStudent('${l.hrno}')">詳細</button></td>
      </tr>`;
    });
    notSubmitted.forEach(h=>{
      html+=`<tr>
        <td>${h}</td><td>—</td>
        <td class="status-out">未入力</td>
        <td>—</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td>
        <td><button class="link-btn" onclick="jumpToStudent('${h}')">詳細</button></td>
      </tr>`;
    });
    html+='</tbody></table></div>';
    wrap.innerHTML=html;
  }catch(e){
    wrap.innerHTML='<p style="color:#E24B4A;">接続に失敗しました。</p>';
  }
}

function updateAttMonthTitle(){
  document.getElementById('att-month-title').textContent=attMonth.getFullYear()+'年'+(attMonth.getMonth()+1)+'月';
}
function changeAttMonth(d){
  attMonth=new Date(attMonth.getFullYear(),attMonth.getMonth()+d,1);
  updateAttMonthTitle();
}

async function loadAttendance(){
  const wrap=document.getElementById('attendance-wrap');
  wrap.innerHTML='<p class="loading">読み込み中…</p>';
  const mk=monthKey(attMonth);
  const daysInMonth=new Date(attMonth.getFullYear(),attMonth.getMonth()+1,0).getDate();
  try{
    const results=await Promise.all(allStudents.map(async h=>{
      const res=await fetch(GAS_URL+'?pass='+encodeURIComponent(sessionPass)+'&type=student&hrno='+h);
      const data=await res.json();
      return {hrno:h,logs:data.logs||[]};
    }));
    let html='<table class="attendance-table"><thead><tr><th>HRNO</th>';
    for(let d=1;d<=daysInMonth;d++) html+=`<th>${d}</th>`;
    html+='<th>記録日数</th></tr></thead><tbody>';
    results.forEach(({hrno,logs})=>{
      const logMap={};
      logs.forEach(l=>{if(l.date.startsWith(mk))logMap[l.date]=l;});
      const days=Object.keys(logMap).length;
      html+=`<tr><td class="att-hrno">${hrno}</td>`;
      for(let d=1;d<=daysInMonth;d++){
        const k=mk+'-'+pad(d);
        const l=logMap[k];
        const total=l?l.times.reduce((a,b)=>a+Number(b),0):0;
        if(l&&total>0) html+=`<td><span class="att-cell-in">${total}</span></td>`;
        else if(l) html+=`<td><span style="color:#ccc;font-size:10px;">0</span></td>`;
        else html+=`<td class="att-cell-out">—</td>`;
      }
      html+=`<td><strong>${days}</strong></td></tr>`;
    });
    html+='</tbody></table>';
    wrap.innerHTML=html;
  }catch(e){
    wrap.innerHTML='<p style="color:#E24B4A;">接続に失敗しました。</p>';
  }
}

function updateSumMonthTitle(){
  document.getElementById('sum-month-title').textContent=sumMonth.getFullYear()+'年'+(sumMonth.getMonth()+1)+'月';
}
function changeSumMonth(d){
  sumMonth=new Date(sumMonth.getFullYear(),sumMonth.getMonth()+d,1);
  updateSumMonthTitle();
}

async function loadSummary(){
  const wrap=document.getElementById('summary-wrap');
  wrap.innerHTML='<p class="loading">読み込み中…</p>';
  const mk=monthKey(sumMonth);
  try{
    const results=await Promise.all(allStudents.map(async h=>{
      const res=await fetch(GAS_URL+'?pass='+encodeURIComponent(sessionPass)+'&type=student&hrno='+h);
      const data=await res.json();
      const logs=(data.logs||[]).filter(l=>l.date.startsWith(mk));
      const days=logs.length;
      const total=logs.reduce((s,l)=>s+l.times.reduce((a,b)=>a+Number(b),0),0);
      const lastLog=logs.length>0?logs.sort((a,b)=>b.date.localeCompare(a.date))[0].date:'—';
      return {hrno:h,days,total,lastLog};
    }));
    summaryData=results;
    summarySort={key:'hrno',asc:true};
    renderSummary();
  }catch(e){
    wrap.innerHTML='<p style="color:#E24B4A;">接続に失敗しました。</p>';
  }
}

function sortSummary(key){
  if(summarySort.key===key) summarySort.asc=!summarySort.asc;
  else{summarySort.key=key;summarySort.asc=true;}
  renderSummary();
}

function renderSummary(){
  const daysInMonth=new Date(sumMonth.getFullYear(),sumMonth.getMonth()+1,0).getDate();
  const sorted=[...summaryData].sort((a,b)=>{
    const av=a[summarySort.key],bv=b[summarySort.key];
    if(av===bv)return 0;
    const r=av>bv?1:-1;
    return summarySort.asc?r:-r;
  });
  const arrow=summarySort.asc?'▲':'▼';
  const th=(key,label)=>`<th class="sortable" onclick="sortSummary('${key}')">${label}${summarySort.key===key?`<span class="sort-arrow">${arrow}</span>`:''}</th>`;
  let html='<div style="overflow-x:auto;"><table><thead><tr>'+
    th('hrno','HRNO')+
    th('days','記録日数')+
    th('total','月合計(分)')+
    th('lastLog','最終入力日')+
    '<th></th></tr></thead><tbody>';
  sorted.forEach(r=>{
    const ratio=Math.round(r.days/daysInMonth*100);
    const dayClass=ratio<30?'warn-low':ratio<60?'warn-mid':'';
    html+=`<tr>
      <td>${r.hrno}</td>
      <td class="${dayClass}">${r.days}日</td>
      <td>${r.total}分（${(r.total/60).toFixed(1)}h）</td>
      <td>${r.lastLog}</td>
      <td><button class="link-btn" onclick="jumpToStudent('${r.hrno}')">詳細</button></td>
    </tr>`;
  });
  html+='</tbody></table></div>';
  html+='<p style="font-size:11px;color:#888;margin-top:8px;">※ <span style="color:#E24B4A;font-weight:600;">赤</span>：記録率30%未満　<span style="color:#EF9F27;font-weight:600;">橙</span>：60%未満</p>';
  document.getElementById('summary-wrap').innerHTML=html;
}

function jumpToStudent(hrno){
  document.getElementById('student-select').value=hrno;
  switchTab('student');
  loadStudent();
}

async function loadStudent(){
  const hrno=document.getElementById('student-select').value;
  if(!hrno){alert('生徒を選択してください');return;}
  const wrap=document.getElementById('student-detail');
  wrap.innerHTML='<p class="loading">読み込み中…</p>';
  try{
    const res=await fetch(GAS_URL+'?pass='+encodeURIComponent(sessionPass)+'&type=student&hrno='+hrno);
    const data=await res.json();
    if(data.error){wrap.innerHTML='<p style="color:#E24B4A;">エラー：'+data.error+'</p>';return;}
    studentLogs={};
    data.logs.forEach(l=>{studentLogs[l.date]=l;});
    currentMonth=new Date();
    renderStudentDetail(hrno);
  }catch(e){
    wrap.innerHTML='<p style="color:#E24B4A;">接続に失敗しました。</p>';
  }
}

function renderStudentDetail(hrno){
  const mk=monthKey(currentMonth);
  const entries=Object.entries(studentLogs).filter(([k])=>k.startsWith(mk));
  const days=entries.length;
  const totals=SUBJECTS.map((_,i)=>entries.reduce((s,[,v])=>s+Number(v.times[i]||0),0));
  const grand=totals.reduce((a,b)=>a+b,0);
  const maxT=Math.max(...totals,1);
  let html=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:1rem;">
      <button onclick="changeStudentMonth(-1)">◀</button>
      <span style="font-size:14px;font-weight:600;min-width:100px;text-align:center;">${currentMonth.getFullYear()}年${currentMonth.getMonth()+1}月</span>
      <button onclick="changeStudentMonth(1)">▶</button>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num">${days}</div><div class="stat-lbl">記録日数</div></div>
      <div class="stat-card"><div class="stat-num">${(grand/60).toFixed(1)}</div><div class="stat-lbl">総学習時間(h)</div></div>
      <div class="stat-card"><div class="stat-num">${days?Math.round(grand/days):0}</div><div class="stat-lbl">平均時間/日(分)</div></div>
      <div class="stat-card"><div class="stat-num">${grand}</div><div class="stat-lbl">月合計(分)</div></div>
    </div>
    <p class="card-title" style="margin-bottom:8px;">教科別 学習時間（分計）</p>
    ${SUBJECTS.map((s,i)=>`
      <div class="bar-row">
        <span class="bar-label">${s}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(totals[i]/maxT*100)}%;background:${SUBJECT_COLORS[i]}"></div></div>
        <span class="bar-val">${totals[i]}</span>
      </div>`).join('')}
    <p class="card-title" style="margin-top:1.5rem;margin-bottom:8px;">日別記録</p>
    <div style="overflow-x:auto;"><table>
      <thead><tr><th>日付</th><th>合計(分)</th><th>国語</th><th>数学</th><th>英語</th><th>理科</th><th>社会</th><th>その他</th><th>メモ</th></tr></thead>
      <tbody>`;
  const daysInMonth=new Date(currentMonth.getFullYear(),currentMonth.getMonth()+1,0).getDate();
  for(let d=1;d<=daysInMonth;d++){
    const k=mk+'-'+pad(d);
    const l=studentLogs[k];
    const total=l?l.times.reduce((a,b)=>a+Number(b),0):null;
    html+=`<tr>
      <td>${currentMonth.getMonth()+1}/${d}</td>
      <td>${total!==null?`<span class="total-min">${total}</span>`:'<span style="color:#ccc;">—</span>'}</td>
      ${l?l.times.map(t=>`<td>${Number(t)||0}</td>`).join(''):'<td>—</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td>'}
      <td style="font-size:12px;color:#888;max-width:200px;">${l&&l.note?l.note:''}</td>
    </tr>`;
  }
  html+='</tbody></table></div>';
  document.getElementById('student-detail').innerHTML=html;
  window._currentHrno=hrno;
}

function changeStudentMonth(d){
  currentMonth=new Date(currentMonth.getFullYear(),currentMonth.getMonth()+d,1);
  renderStudentDetail(window._currentHrno);
}
</script>
</body>
</html>
