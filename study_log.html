<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R8年度 学習記録</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Meiryo',sans-serif;background:#f5f5f5;color:#1a1a1a;}
.app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;padding:1rem;}
.tab-bar{display:flex;border-bottom:1px solid #e0e0e0;margin-bottom:1.25rem;}
.tab{flex:1;padding:10px 0;font-size:13px;font-weight:500;text-align:center;cursor:pointer;color:#888;border-bottom:2px solid transparent;}
.tab.active{color:#1a1a1a;border-bottom:2px solid #1D9E75;}
.section{display:none;}.section.active{display:block;}
.section-head{font-size:11px;font-weight:600;color:#888;letter-spacing:.06em;margin-bottom:8px;margin-top:14px;}
.profile-info{background:#f0faf6;border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.avatar{width:38px;height:38px;border-radius:50%;background:#9FE1CB;color:#085041;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.profile-text{font-size:13px;font-weight:600;color:#1a1a1a;}
.profile-sub{font-size:11px;color:#888;}
.date-nav{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.date-nav button{background:#fff;border:1px solid #ddd;border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer;color:#1a1a1a;}
.date-nav button:disabled{opacity:0.3;cursor:not-allowed;}
.date-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
.date-display{font-size:13px;font-weight:600;color:#1a1a1a;text-align:center;}
.date-display.has-log{color:#0F6E56;}
.date-badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 10px;border-radius:20px;line-height:1.6;}
.badge-today{background:#1D9E75;color:#fff;}
.badge-yesterday{background:#378ADD;color:#fff;}
.badge-hidden{display:none;}
.subject-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.subject-name{font-size:13px;font-weight:600;color:#1a1a1a;}
.time-input{flex:1;height:36px;border:1px solid #ddd;border-radius:8px;padding:0 8px;font-size:14px;text-align:center;background:#fff;color:#1a1a1a;}
.time-input.error{border-color:#E24B4A;background:#fff5f5;}
.unit{font-size:12px;color:#888;width:16px;}
.note-area{width:100%;height:64px;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:13px;resize:none;font-family:inherit;background:#fff;color:#1a1a1a;}
.btn-primary{width:100%;padding:13px;background:#1D9E75;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:14px;}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;}
.card{background:#f8f8f8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px;}
.card-title{font-size:13px;color:#888;margin-bottom:10px;}
.month-select{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.month-select button{background:#fff;border:1px solid #ddd;border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer;color:#1a1a1a;}
.month-title{font-size:14px;font-weight:600;color:#1a1a1a;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.bar-label{font-size:12px;width:42px;color:#666;}
.bar-track{flex:1;height:16px;background:#e8e8e8;border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width 0.4s;}
.bar-val{font-size:12px;font-weight:600;width:36px;text-align:right;color:#1a1a1a;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.stat-card{background:#f8f8f8;border-radius:10px;padding:10px 12px;text-align:center;}
.stat-num{font-size:24px;font-weight:600;color:#1a1a1a;}
.stat-lbl{font-size:11px;color:#888;margin-top:2px;}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center;}
.week-label{font-size:10px;color:#888;padding:2px 0;}
.day-cell{font-size:11px;padding:5px 2px;border-radius:4px;cursor:pointer;color:#888;}
.day-cell.has-log{background:#9FE1CB;color:#085041;font-weight:600;}
.day-cell.today{outline:2px solid #1D9E75;}
.setting-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.setting-label{font-size:13px;width:56px;color:#666;flex-shrink:0;}
.text-input{flex:1;height:36px;border:1px solid #ddd;border-radius:8px;padding:0 10px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;}
.text-input.error{border-color:#E24B4A;}
.field-hint{font-size:11px;margin-left:64px;margin-bottom:10px;color:#888;}
.field-hint.ok{color:#0F6E56;}
.field-hint.ng{color:#E24B4A;}
.profile-status{border-radius:8px;padding:10px 14px;margin-top:14px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;}
.profile-status.saved{background:#E1F5EE;color:#085041;}
.profile-status.unsaved{background:#FCEBEB;color:#A32D2D;}
.send-status{font-size:12px;color:#666;text-align:center;margin-top:6px;min-height:18px;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);white-space:nowrap;background:#085041;color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:500;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:99;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">
<div class="tab-bar">
  <div class="tab active" onclick="switchTab('log')">記録する</div>
  <div class="tab" onclick="switchTab('stats')">統計</div>
  <div class="tab" onclick="switchTab('calendar')">カレンダー</div>
  <div class="tab" onclick="switchTab('settings')">設定</div>
</div>

<div id="log" class="section active">
  <div class="profile-info">
    <div class="avatar" id="avatar-initials">?</div>
    <div>
      <div class="profile-text" id="profile-name-disp">未設定</div>
      <div class="profile-sub" id="profile-hrno-disp">設定タブでHRNO・氏名を登録してください</div>
    </div>
  </div>
  <div class="date-nav">
    <button id="btn-prev" onclick="shiftDate(-1)">◀</button>
    <div class="date-center">
      <span class="date-display" id="date-disp"></span>
      <span class="date-badge badge-hidden" id="date-badge"></span>
    </div>
    <button id="btn-next" onclick="shiftDate(1)">▶</button>
  </div>
  <p class="section-head">学習時間（分）</p>
  <div id="time-inputs"></div>
  <p class="section-head">メモ・振り返り</p>
  <textarea class="note-area" id="note" placeholder="今日の気づき、困ったこと、目標など…"></textarea>
  <button class="btn-primary" id="save-btn" onclick="saveAndSend()">記録して送信</button>
  <div class="send-status" id="send-status"></div>
</div>

<div id="stats" class="section">
  <div class="month-select">
    <button onclick="changeMonth(-1)">◀</button>
    <span class="month-title" id="month-title"></span>
    <button onclick="changeMonth(1)">▶</button>
  </div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-num" id="s-days">0</div><div class="stat-lbl">記録日数</div></div>
    <div class="stat-card"><div class="stat-num" id="s-total">0</div><div class="stat-lbl">総学習時間(h)</div></div>
    <div class="stat-card"><div class="stat-num" id="s-avg">0</div><div class="stat-lbl">平均時間/日(分)</div></div>
    <div class="stat-card"><div class="stat-num" id="s-streak">0</div><div class="stat-lbl">連続記録日数</div></div>
  </div>
  <div class="card">
    <p class="card-title">教科別 学習時間（分計）</p>
    <div id="bar-chart"></div>
  </div>
</div>

<div id="calendar" class="section">
  <div class="month-select">
    <button onclick="changeCalMonth(-1)">◀</button>
    <span class="month-title" id="cal-month-title"></span>
    <button onclick="changeCalMonth(1)">▶</button>
  </div>
  <div class="card">
    <div class="week-grid" id="cal-header"></div>
    <div class="week-grid" id="cal-grid"></div>
  </div>
  <div id="day-detail"></div>
</div>

<div id="settings" class="section">
  <p class="section-head">プロフィール（初回のみ設定）</p>
  <div class="setting-row">
    <span class="setting-label">HRNO</span>
    <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="4"
      class="text-input" id="set-hrno" placeholder="例：2301"
      oninput="sanitizeHrno(this)" onblur="validateHrno(this)">
  </div>
  <div class="field-hint" id="hrno-hint">半角数字4桁で入力してください</div>
  <div class="setting-row">
    <span class="setting-label">氏名</span>
    <input type="text" class="text-input" id="set-name" placeholder="例：山田 太郎">
  </div>
  <button class="btn-primary" onclick="saveProfile()">保存</button>
  <div class="profile-status unsaved" id="profile-status">
    <span class="status-icon">—</span>
    <span id="profile-status-text">プロフィールが未登録です</span>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
/* =====================================================
   ★ 教師がここだけ変更してください
   ===================================================== */
const GAS_URL = 'ここにGAS WebアプリのURLを貼り付ける';
/* ===================================================== */

const SUBJECTS = [
  { name: '国語',   color: '#D4537E' },
  { name: '数学',   color: '#378ADD' },
  { name: '英語',   color: '#1D9E75' },
  { name: '理科',   color: '#EF9F27' },
  { name: '社会',   color: '#7F77DD' },
  { name: 'その他', color: '#888780' }
];
const DOW = ['日','月','火','水','木','金','土'];
let logs = {}, profile = { hrno: '', name: '' };
let currentDate, statsMonth, calMonth;

function pad(n) { return String(n).padStart(2, '0'); }
function dateStr(d) { return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()); }
function todayDate() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function yesterdayDate() { const d = new Date(); d.setDate(d.getDate()-1); d.setHours(0,0,0,0); return d; }
function monthKey(d) { return d.getFullYear() + '-' + pad(d.getMonth()+1); }

function toHankakuInt(str) {
  return str
    .replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
    .replace(/[^0-9]/g, '');
}

function sanitizeHrno(el) {
  el.value = toHankakuInt(el.value).slice(0, 4);
  el.classList.remove('error');
  document.getElementById('hrno-hint').className = 'field-hint';
  document.getElementById('hrno-hint').textContent = '半角数字4桁で入力してください';
}

function validateHrno(el) {
  const v = el.value;
  if (v === '' || v.length === 4) {
    el.classList.remove('error');
    document.getElementById('hrno-hint').className = 'field-hint' + (v.length === 4 ? ' ok' : '');
    document.getElementById('hrno-hint').textContent = v.length === 4 ? 'OK' : '半角数字4桁で入力してください';
  } else {
    el.classList.add('error');
    document.getElementById('hrno-hint').className = 'field-hint ng';
    document.getElementById('hrno-hint').textContent = '4桁で入力してください（現在' + v.length + '桁）';
  }
}

function sanitizeTimeInput(el) {
  const raw = toHankakuInt(el.value);
  el.value = raw;
  const n = parseInt(raw) || 0;
  el.classList.toggle('error', raw !== '' && (n < 0 || n > 600));
}

function renderProfileStatus() {
  const ok = profile.hrno.length === 4 && profile.name.trim() !== '';
  const el = document.getElementById('profile-status');
  el.className = 'profile-status ' + (ok ? 'saved' : 'unsaved');
  el.querySelector('.status-icon').textContent = ok ? '✓' : '—';
  document.getElementById('profile-status-text').textContent = ok
    ? 'HRNO: ' + profile.hrno + '　氏名: ' + profile.name
    : 'プロフィールが未登録です';
}

function init() {
  const sl = localStorage.getItem('study_logs_v8');
  const sp = localStorage.getItem('study_profile_v8');
  if (sl) logs = JSON.parse(sl);
  if (sp) profile = JSON.parse(sp);
  document.getElementById('set-hrno').value = profile.hrno || '';
  document.getElementById('set-name').value  = profile.name  || '';
  if (profile.hrno) validateHrno(document.getElementById('set-hrno'));

  currentDate = todayDate();
  statsMonth  = new Date(currentDate);
  calMonth    = new Date(currentDate);

  const ti = document.getElementById('time-inputs');
  SUBJECTS.forEach((s, i) => {
    ti.innerHTML += `<div class="subject-row">
      <span class="dot" style="background:${s.color}"></span>
      <span class="subject-name" style="width:${i===5?'42px':'36px'}">${s.name}</span>
      <input type="text" inputmode="numeric" pattern="[0-9]*"
        class="time-input" id="t${i}" placeholder="0"
        oninput="sanitizeTimeInput(this)" onblur="sanitizeTimeInput(this)">
      <span class="unit">分</span>
    </div>`;
  });

  renderProfile();
  renderProfileStatus();
  loadDateToForm();
  renderStats();
  renderCal();
}

function renderProfile() {
  const n = profile.name || '未設定';
  const h = profile.hrno || '';
  document.getElementById('profile-name-disp').textContent = n;
  document.getElementById('profile-hrno-disp').textContent = h ? 'HRNO: ' + h : '設定タブでHRNO・氏名を登録してください';
  const initial = n !== '未設定' ? n.replace(/\s/g,'').charAt(0) : '?';
  document.getElementById('avatar-initials').textContent = initial;
}

function loadDateToForm() {
  const k  = dateStr(currentDate);
  const td = dateStr(todayDate());
  const yd = dateStr(yesterdayDate());
  const isToday     = k === td;
  const isYesterday = k === yd;
  const wd = DOW[currentDate.getDay()];

  const disp = document.getElementById('date-disp');
  disp.textContent = currentDate.getFullYear() + '年' + (currentDate.getMonth()+1) + '月' + currentDate.getDate() + '日（' + wd + '）';
  disp.className = 'date-display' + (logs[k] ? ' has-log' : '');

  const badge = document.getElementById('date-badge');
  if (isToday) {
    badge.textContent = '今日';
    badge.className = 'date-badge badge-today';
  } else if (isYesterday) {
    badge.textContent = '昨日';
    badge.className = 'date-badge badge-yesterday';
  } else {
    badge.textContent = '';
    badge.className = 'date-badge badge-hidden';
  }

  document.getElementById('btn-next').disabled = isToday;
  const l = logs[k];
  SUBJECTS.forEach((_, i) => {
    const el = document.getElementById('t' + i);
    el.value = l ? (l.times[i] || '') : '';
    el.classList.remove('error');
  });
  document.getElementById('note').value = l ? (l.note || '') : '';
  document.getElementById('send-status').textContent = '';
}

function shiftDate(d) {
  const nd = new Date(currentDate);
  nd.setDate(nd.getDate() + d);
  if (nd > todayDate()) return;
  currentDate = nd;
  loadDateToForm();
}

async function saveAndSend() {
  if (!profile.hrno || !profile.name) { showToast('設定タブでHRNO・氏名を登録してください'); return; }

  let hasError = false;
  const times = SUBJECTS.map((_, i) => {
    const el = document.getElementById('t' + i);
    sanitizeTimeInput(el);
    if (el.classList.contains('error')) hasError = true;
    return parseInt(el.value) || 0;
  });
  if (hasError) { showToast('入力値を確認してください（0〜600分）'); return; }

  const k    = dateStr(currentDate);
  const note = document.getElementById('note').value;
  logs[k] = { times, note };
  localStorage.setItem('study_logs_v8', JSON.stringify(logs));
  loadDateToForm(); renderStats(); renderCal();

  const statusEl = document.getElementById('send-status');
  const btn      = document.getElementById('save-btn');
  const gasOk    = GAS_URL.trim() !== '' && !GAS_URL.includes('ここに');

  if (!gasOk) {
    statusEl.textContent = '※ローカルに保存しました（送信先未設定）';
    showToast('ローカルに保存しました');
    return;
  }

  btn.disabled = true; btn.textContent = '送信中…'; statusEl.textContent = '';
  try {
    const payload = { date: k, hrno: profile.hrno, name: profile.name, times, note };
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    showToast('記録して送信しました！');
    statusEl.textContent = '送信完了 ✓';
  } catch(e) {
    showToast('送信に失敗しました（記録は保存済み）');
    statusEl.textContent = '送信失敗 — 後でもう一度お試しください';
  } finally {
    btn.disabled = false; btn.textContent = '記録して送信';
  }
}

function saveProfile() {
  const hrnoEl  = document.getElementById('set-hrno');
  const nameVal = document.getElementById('set-name').value.trim();
  validateHrno(hrnoEl);
  if (hrnoEl.value.length !== 4) { showToast('HRNOは4桁の半角数字で入力してください'); return; }
  if (!nameVal) { showToast('氏名を入力してください'); return; }
  profile.hrno = hrnoEl.value;
  profile.name = nameVal;
  localStorage.setItem('study_profile_v8', JSON.stringify(profile));
  renderProfile();
  renderProfileStatus();
  showToast('プロフィールを保存しました');
}

function changeMonth(d)    { statsMonth = new Date(statsMonth.getFullYear(), statsMonth.getMonth()+d, 1); renderStats(); }
function changeCalMonth(d) { calMonth   = new Date(calMonth.getFullYear(),   calMonth.getMonth()+d,   1); renderCal();   }

function renderStats() {
  const mk = monthKey(statsMonth);
  document.getElementById('month-title').textContent = statsMonth.getFullYear() + '年' + (statsMonth.getMonth()+1) + '月';
  const entries = Object.entries(logs).filter(([k]) => k.startsWith(mk));
  const days    = entries.length;
  const totals  = SUBJECTS.map((_, i) => entries.reduce((s, [, v]) => s + (v.times[i] || 0), 0));
  const grand   = totals.reduce((a, b) => a + b, 0);
  document.getElementById('s-days').textContent   = days;
  document.getElementById('s-total').textContent  = (grand / 60).toFixed(1);
  document.getElementById('s-avg').textContent    = days ? Math.round(grand / days) : 0;
  document.getElementById('s-streak').textContent = calcStreak();
  const maxT = Math.max(...totals, 1);
  document.getElementById('bar-chart').innerHTML = SUBJECTS.map((s, i) => `
    <div class="bar-row">
      <span class="bar-label">${s.name}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(totals[i]/maxT*100)}%;background:${s.color}"></div></div>
      <span class="bar-val">${totals[i]}</span>
    </div>`).join('');
}

function calcStreak() {
  let streak = 0, d = todayDate();
  while (true) { if (!logs[dateStr(d)]) break; streak++; d.setDate(d.getDate()-1); }
  return streak;
}

function renderCal() {
  document.getElementById('cal-month-title').textContent = calMonth.getFullYear() + '年' + (calMonth.getMonth()+1) + '月';
  document.getElementById('cal-header').innerHTML = DOW.map(l => `<div class="week-label">${l}</div>`).join('');
  const first = new Date(calMonth.getFullYear(), calMonth.getMonth(), 1);
  const last  = new Date(calMonth.getFullYear(), calMonth.getMonth()+1, 0);
  const td    = dateStr(todayDate());
  let cells = '';
  for (let i = 0; i < first.getDay(); i++) cells += `<div></div>`;
  for (let d = 1; d <= last.getDate(); d++) {
    const k = calMonth.getFullYear() + '-' + pad(calMonth.getMonth()+1) + '-' + pad(d);
    cells += `<div class="day-cell${logs[k]?' has-log':''}${k===td?' today':''}" onclick="showDayDetail('${k}')">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML = cells;
}

function showDayDetail(k) {
  const l   = logs[k];
  const det = document.getElementById('day-detail');
  if (!l) { det.innerHTML = ''; return; }
  const total = l.times.reduce((a, b) => a + b, 0);
  det.innerHTML = `<div class="card" style="margin-top:12px;">
    <p class="card-title">${k}の記録（合計 ${total}分）</p>
    ${SUBJECTS.map((s, i) => l.times[i] ? `<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid #eee;">
      <span style="color:${s.color};font-weight:600;">${s.name}</span><span>${l.times[i]}分</span></div>` : '').join('')}
    ${l.note ? `<p style="font-size:12px;color:#888;margin-top:8px;">${l.note}</p>` : ''}
  </div>`;
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', ['log','stats','calendar','settings'][i] === t));
  document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
  document.getElementById(t).classList.add('active');
  if (t === 'stats')    renderStats();
  if (t === 'calendar') renderCal();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2300);
}

init();
</script>
</body>
</html>
